name: test RFC8927 reconstitution

on: [push]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions: {}

jobs:
  test-rfc8927-reconstitution:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Analyze the code with test_rfcC8927_reconstitution.py
        run: ./bin/test_rfc8927_reconstitution.py

      - name: Notify Slack on failure
        if: (failure() || cancelled()) && github.ref_name == github.event.repository.default_branch
        uses: senzing-factory/build-resources/slack-failure-notification@v4
        with:
          job-status: ${{ job.status }}
          slack-channel: ${{ secrets.SLACK_CHANNEL }}
          slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}
